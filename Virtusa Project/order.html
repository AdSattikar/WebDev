<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Important to make website responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Website</title>

    <!-- Link our CSS file -->
    <link rel="stylesheet" href="menu.css">
    <link rel="stylesheet" href="FoodOrder.css">
</head>

<body>
    <nav id="navbar">
        <div id="logo">
            <img src="Logo.png">
        </div>  
        <ul>
            <li class="item"><a href="FoodOrder.html" >Home</a></li>
            <li class="item"><a href="FoodOrder.html">Services</a></li>
            <li class="item"><a href="#">About Us</a></li>
            <li class="item"><a href="#">Contact Us</a></li>
            <li class="cart"><a href="#">Cart</a></li>
        </ul>
    </nav>

    <!-- fOOD sEARCH Section Starts Here -->
    <section class="order_confirm">
        <div class="container">
            
            <h2 class="text-center text-white">Order Confirmation</h2>

            <form action="#" class="order">
                <fieldset>
                    <legend><h3><strong>Selected item</strong></h3></legend>

                    <div class="food-menu-img">
                        <img src="images/menu-pizza.jpg" alt="Chicke Hawain Pizza" class="img-responsive img-curve">
                    </div>
    
                    <div class="food-menu-desc">
                        <h3>Pizza</h3>
                        <p class="food-price">Rs.650</p>

                        <div class="order-label">Quantity</div>
                        <input type="number" name="qty" class="input-responsive" value="1" required>
                        
                    </div>

                </fieldset>
                
                <fieldset>
                    <legend><h3><strong>Delivery Details</strong></h3></legend>
                    <div class="order-label">Choose Your Delivery Option</div>

                    <label><input name="any" class="choose" value="At Stadium" checked type="radio">At Stadium</label>
                    <label><input name="any" class="choose" value="Dining" checked type="radio">Dining</label>
                    <label><input name="any" class="choose"value="Delivery/Takeaway" checked type="radio">Delivery</label>

                    <div class="order-label">Full Name</div>
                    <input type="text" name="full-name" placeholder="" class="input-responsive" required>

                    <div class="order-label">Phone Number</div>
                    <input type="tel" name="contact" placeholder="" class="input-responsive" required>

                    <div class="order-label">Email</div>
                    <input type="email" name="email" placeholder="" class="input-responsive" required>

                    <div class="order-label">Address</div>
                    <textarea name="address" rows="10" placeholder="" class="input-responsive" required></textarea>

                    <input type="submit" name="submit" value="Add to Cart" class="btn btn-primary">
                </fieldset>

            </form>

        </div>
    </section>
    <!-- fOOD sEARCH Section Ends Here --
  

</body>
</html>
